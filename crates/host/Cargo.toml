[package]
name = "host"
version = "0.0.0"
edition.workspace = true
license.workspace = true
repository.workspace = true
publish = false

[lib]

[[bin]]
name = "host"
path = "src/main.rs"

[dependencies]
anyhow.workspace = true
tao.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true
