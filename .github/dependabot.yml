version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    exclude-paths:
      - repos/**
    schedule:
      interval: weekly
    commit-message:
      prefix: ci

  - package-ecosystem: npm
    directory: /
    exclude-paths:
      - repos/**
    schedule:
      interval: weekly
    commit-message:
      prefix: deps
    groups:
      typescript-toolchain:
        patterns:
          - typescript
          - "@types/*"
      lint-and-format:
        patterns:
          - oxlint
          - prettier
      monorepo-tooling:
        patterns:
          - turbo

  - package-ecosystem: cargo
    directory: /
    exclude-paths:
      - repos/**
    schedule:
      interval: weekly
    commit-message:
      prefix: deps
