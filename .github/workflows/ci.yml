name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: validate (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.13

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable @ 2026-05-04
        with:
          components: rustfmt, clippy

      - name: Install Linux WebView dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev xvfb xauth

      - name: Cache Cargo registry and target
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: bun install
        run: bun install --frozen-lockfile

      - name: bun run check
        run: bun run check

      - name: bun run typecheck
        run: bun run typecheck

      - name: bun run lint
        run: bun run lint

      - name: bun run lint:types
        run: bun run lint:types

      - name: bun run format:check
        run: bun run format:check

      - name: bun test
        run: bun test

      - name: cargo fmt --check
        run: cargo fmt --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo check --workspace
        run: cargo check --workspace

      - name: cargo run -p host
        if: runner.os != 'Linux'
        run: cargo run -p host -- --window-smoke-test

      - name: cargo run -p host (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run -a cargo run -p host -- --window-smoke-test

      - name: cargo test --workspace
        if: runner.os != 'Linux'
        run: cargo test --workspace

      - name: cargo test --workspace (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run -a cargo test --workspace
