name: docs-deploy

on:
  push:
    branches: ["main"]
  pull_request:
    types: [opened, reopened, synchronize, closed]

permissions:
  contents: read

concurrency:
  group: docs-deploy-${{ github.event.pull_request.number || github.ref_name }}
  cancel-in-progress: false

env:
  STAGE: ${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.number) || 'prod' }}
  BUILD_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

jobs:
  deploy:
    name: deploy docs
    if: >-
      github.event.action != 'closed' &&
      (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ env.BUILD_SHA }}

      - name: Install Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.13

      - name: bun install
        run: bun install --frozen-lockfile

      - name: docs typecheck
        run: bun --filter @effect-desktop/docs typecheck

      - name: docs lint
        run: bun --filter @effect-desktop/docs lint

      - name: docs build
        run: bun --filter @effect-desktop/docs build

      - name: Deploy docs
        working-directory: apps/docs
        run: bun run deploy -- --stage "$STAGE"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PULL_REQUEST: ${{ github.event.number }}
          BUILD_SHA: ${{ env.BUILD_SHA }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  cleanup:
    name: cleanup docs preview
    if: >-
      github.event_name == 'pull_request' &&
      github.event.action == 'closed' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.base.ref }}

      - name: Install Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.13

      - name: bun install
        run: bun install --frozen-lockfile

      - name: Safety check
        run: |
          if [ "$STAGE" = "prod" ]; then
            echo "ERROR: refusing to destroy prod from preview cleanup"
            exit 1
          fi

      - name: Destroy docs preview
        working-directory: apps/docs
        run: bun run destroy -- --stage "$STAGE"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
